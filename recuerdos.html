<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños - Recuerdos</title>
    <style>
        /* Estilos de fondo y tipografía */
        body {
            background-color: #fac068; /* Fondo oscuro */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            color: rgb(20, 19, 19);
        }

        h1 {
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Contenedor del collage */
        .collage-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            justify-items: center;
        }

        /* Estilo de la Polaroid */
        .polaroid {
            background: #fdfdfd;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 20px rgba(247, 184, 102, 0.3);
            position: relative;
            transition: transform 0.3s ease;
            width: 220px;
        }

        .polaroid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: sepia(20%) contrast(90%); /* Efecto vintage */
        }

        /* Efecto de cinta adhesiva */
        .polaroid::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Rotaciones aleatorias para realismo */
        .polaroid:nth-child(odd) { transform: rotate(-2deg); }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(3n) { transform: rotate(-1deg); }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }

        /* Texto debajo de la foto */
        .caption {
            color: #111111;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        footer {
            margin-top: 50px;
            font-size: 1.2em;
            color: #070707;
        }
    </style>
</head>
<body>

    <h1>Feliz Cumpleaños Amor</h1>

    <div class="collage-container">
        <div class="polaroid">
            <img src="img/WhatsApp Image 2026-04-28 at 11.33.35 PM.jpeg" alt="Recuerdo 1">

        <div class="polaroid">

        <div class="polaroid">
            <img src="img/WhatsApp Image 2026-04-28 at 11.33.36 PM (4).jpeg" alt="Recuerdo 5">

        <div class="polaroid">

        <div class="polaroid">
